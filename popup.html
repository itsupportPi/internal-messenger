<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Internal Popup Messages</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 10px;
      background: #f5f5f5;
    }
    #messages {
      height: 300px;
      overflow-y: auto;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }
    #msgInput {
      width: 80%;
      padding: 8px;
    }
    #sendBtn {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h3>📨 Internal Messages</h3>

  <div id="messages"></div>

  <input id="msgInput" type="text" placeholder="Γράψε μήνυμα...">
  <button id="sendBtn">Send</button>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Config + Logic -->
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>

</body>
</html>
